
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Seattle Grocery Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:sans-serif; }
#map { height:100vh; }
#searchBox {
    position:absolute;
    top:20px;
    left:20px;
    z-index:1000;
    background:white;
    padding:12px;
    border-radius:8px;
    box-shadow:0 4px 12px rgba(0,0,0,.2);
}
input { width:220px; padding:6px; }
button { padding:6px 10px; }
#mapSearchStatus { margin-top:6px; font-size:13px; color:#555; }
</style>

</head>

<body>

<div id="searchBox">
<form id="searchForm">
<input id="mapSearchInput" list="searchSuggestions" placeholder="Search grocery"/>
<datalist id="searchSuggestions"></datalist>
<button>Search</button>
</form>
<div id="mapSearchStatus"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([47.6062,-122.3321], 12);

L.tileLayer(
"https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
{ maxZoom:19, opacity:.8 }
).addTo(map);

async function loadSeattleGroceries() {
    const response = await fetch("./seattle_groceries.json");
    const data = await response.json();
    window.SEATTLE_GROCERY_DATA = data.stores;
}

function updateLocalGrocerySuggestions(query) {

    const datalist = document.getElementById("searchSuggestions");
    datalist.innerHTML = "";

    if(!window.SEATTLE_GROCERY_DATA) return;

    query = query.toLowerCase();

    window.SEATTLE_GROCERY_DATA
        .filter(x =>
            x.name.toLowerCase().includes(query) ||
            (x.address && x.address.toLowerCase().includes(query))
        )
        .slice(0,8)
        .forEach(store=>{

            const option=document.createElement("option");

            option.value = store.name;
            option.label =
                store.name + " — " + (store.address || "");

            datalist.appendChild(option);
        });
}

function findLocalGroceryMatch(query){

    query=query.toLowerCase();

    return window.SEATTLE_GROCERY_DATA.find(x=>
        x.name.toLowerCase().includes(query)
    );
}

function addUserPin(lat,lon,name){
    L.marker([lat,lon])
        .addTo(map)
        .bindPopup(name)
        .openPopup();
}

const searchInput=document.getElementById("mapSearchInput");
const searchForm=document.getElementById("searchForm");
const searchStatus=document.getElementById("mapSearchStatus");

searchInput.addEventListener("input",()=>{
    updateLocalGrocerySuggestions(searchInput.value);
});

searchInput.addEventListener("change",()=>{

    if(!searchInput.value.trim()) return;

    searchForm.dispatchEvent(
        new Event("submit",{bubbles:true,cancelable:true})
    );
});

searchForm.addEventListener("submit",function(e){

    e.preventDefault();

    const query=searchInput.value.trim();

    const match=findLocalGroceryMatch(query);

    if(!match){
        searchStatus.textContent="No grocery match found";
        return;
    }

    map.flyTo([match.lat,match.lon],16);

    addUserPin(match.lat,match.lon,match.name);

    searchStatus.innerHTML=
        "<strong>"+match.name+"</strong><br>"+
        (match.address||"");
});

loadSeattleGroceries();

</script>

</body>
</html>
